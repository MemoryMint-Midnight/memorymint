# Run from WSL2 Ubuntu — NOT Docker Desktop (crashes on this machine)
# Usage: docker compose up -d
#
# Proof server runs remotely at https://proof-server.preprod.midnight.network
# Only the midnight sidecar service runs locally.

services:

  midnight-svc:
    build:
      context: ./service
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
