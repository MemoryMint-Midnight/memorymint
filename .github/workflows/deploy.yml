name: Build & Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_WORDPRESS_API_URL: ${{ secrets.NEXT_PUBLIC_WORDPRESS_API_URL }}

      - name: Install sshpass
        run: sudo apt-get install -y sshpass

      - name: Deploy via rsync over SSH
        run: |
          sshpass -p "${{ secrets.FTP_PASSWORD }}" rsync -avzr --delete \
            -e "ssh -o StrictHostKeyChecking=no -p 22" \
            ./frontend/out/ \
            ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_SERVER }}:/home/memohecy/public_html/
