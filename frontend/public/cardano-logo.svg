<svg viewBox="0 0 100 100" fill="black" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="black" stroke-width="7"/>
  <!-- Center -->
  <circle cx="50" cy="50" r="5"/>
  <!-- Ring 1: r=13, starting at top (-90deg), every 60deg -->
  <circle cx="50"   cy="37"   r="3.5"/>
  <circle cx="61.3" cy="43.5" r="3.5"/>
  <circle cx="61.3" cy="56.5" r="3.5"/>
  <circle cx="50"   cy="63"   r="3.5"/>
  <circle cx="38.7" cy="56.5" r="3.5"/>
  <circle cx="38.7" cy="43.5" r="3.5"/>
  <!-- Ring 2: r=22, offset 30deg from ring 1 (-60deg start) -->
  <circle cx="61"   cy="31"   r="3"/>
  <circle cx="72"   cy="50"   r="3"/>
  <circle cx="61"   cy="69"   r="3"/>
  <circle cx="39"   cy="69"   r="3"/>
  <circle cx="28"   cy="50"   r="3"/>
  <circle cx="39"   cy="31"   r="3"/>
  <!-- Ring 3: r=31, same alignment as ring 1 -->
  <circle cx="50"   cy="19"   r="2.5"/>
  <circle cx="76.8" cy="34.5" r="2.5"/>
  <circle cx="76.8" cy="65.5" r="2.5"/>
  <circle cx="50"   cy="81"   r="2.5"/>
  <circle cx="23.2" cy="65.5" r="2.5"/>
  <circle cx="23.2" cy="34.5" r="2.5"/>
  <!-- Ring 4: r=38, same alignment as ring 2 -->
  <circle cx="69"   cy="17"   r="1.8"/>
  <circle cx="88"   cy="50"   r="1.8"/>
  <circle cx="69"   cy="83"   r="1.8"/>
  <circle cx="31"   cy="83"   r="1.8"/>
  <circle cx="12"   cy="50"   r="1.8"/>
  <circle cx="31"   cy="17"   r="1.8"/>
</svg>
